<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>يلا بينا — Live Party Challenge</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00e5ff;
            --neon-purple: #b400ff;
            --neon-pink: #ff2bd6;
            --bg-0: #05060f;
            --bg-1: #0a0b1e;
            --glass: rgba(20, 10, 50, .35);
            --glass-brd: rgba(120, 90, 255, .35);
            --text: #e8ecff;
            --muted: #8a90c0;
            --good: #3dffa2;
            --bad: #ff4d6d;
            --gold: #ffd700;
            --grad: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            --grad2: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
            --shadow-neon: 0 0 30px rgba(0, 229, 255, .35), 0 0 60px rgba(180, 0, 255, .25);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }
        html,
        body {
            height: 100%;
            background: var(--bg-0);
            color: var(--text);
            font-family: 'Tajawal', system-ui, sans-serif;
            overflow: hidden
        }
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: radial-gradient(1200px 800px at 30% 20%, rgba(180, 0, 255, .25), transparent 60%), radial-gradient(1000px 700px at 80% 80%, rgba(0, 229, 255, .22), transparent 60%), linear-gradient(180deg, #02030a, #0a0730)
        }
        #mouse-light {
            position: fixed;
            pointer-events: none;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0, 229, 255, .15), transparent 60%);
            transform: translate(-50%, -50%);
            z-index: 1;
            filter: blur(20px);
            transition: opacity .3s
        }
        #particles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none
        }
        #app {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column
        }
        .glass {
            background: var(--glass);
            backdrop-filter: blur(18px) saturate(140%);
            border: 1px solid var(--glass-brd);
            border-radius: 20px;
            box-shadow: var(--shadow-neon)
        }
        .btn {
            position: relative;
            font-family: inherit;
            font-weight: 700;
            padding: 12px 22px;
            border-radius: 14px;
            border: 1px solid var(--glass-brd);
            background: linear-gradient(135deg, rgba(0, 229, 255, .15), rgba(180, 0, 255, .15));
            color: var(--text);
            cursor: pointer;
            letter-spacing: .5px;
            transition: transform .15s ease, box-shadow .3s ease, background .3s;
            overflow: hidden
        }
        .btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 25px rgba(0, 229, 255, .5), 0 0 40px rgba(180, 0, 255, .4)
        }
        .btn:active {
            transform: translateY(0) scale(.98)
        }
        .btn.primary {
            background: var(--grad);
            border: none;
            color: #000
        }
        .btn.ghost {
            background: transparent
        }
        .btn.danger {
            background: linear-gradient(135deg, #ff2b6d, #b400ff)
        }
        .btn.gold {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            color: #000
        }
        .btn.sm {
            padding: 8px 14px;
            font-size: .85rem;
            border-radius: 10px
        }
        .btn:disabled {
            opacity: .4;
            cursor: not-allowed;
            transform: none !important
        }
        .input {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--glass-brd);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color .2s, box-shadow .2s
        }
        .input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 229, 255, .35)
        }
        label {
            display: block;
            font-size: .85rem;
            color: var(--muted);
            margin: 8px 0 4px
        }
        #auth-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px
        }
        .auth-card {
            width: min(460px, 100%);
            padding: 32px
        }
        .auth-card h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            text-align: center;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 6px;
            letter-spacing: 2px
        }
        .auth-card .sub {
            text-align: center;
            color: var(--muted);
            margin-bottom: 18px
        }
        .tabs {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, .04);
            padding: 6px;
            border-radius: 12px;
            margin-bottom: 16px
        }
        .tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            color: var(--muted);
            transition: .25s
        }
        .tab.active {
            background: var(--grad);
            color: #000
        }
        .link {
            color: var(--neon-blue);
            cursor: pointer;
            text-decoration: none;
            font-size: .9rem
        }
        .link:hover {
            text-decoration: underline
        }
        .topbar {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-bottom: 1px solid var(--glass-brd);
            background: rgba(10, 7, 30, .6);
            backdrop-filter: blur(20px);
            z-index: 5;
            flex-wrap: wrap
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px
        }
        .nav {
            display: flex;
            gap: 6px;
            flex: 1;
            margin: 0 20px;
            flex-wrap: wrap
        }
        .nav .n {
            padding: 8px 14px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--muted);
            font-weight: 700;
            transition: .2s;
            border: 1px solid transparent
        }
        .nav .n:hover {
            color: var(--text);
            background: rgba(255, 255, 255, .05)
        }
        .nav .n.active {
            color: #000;
            background: var(--grad)
        }
        .wallet {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap
        }
        .chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--glass-brd);
            font-weight: 700;
            font-size: .9rem
        }
        .chip.coin {
            color: #ffd447
        }
        .chip.gem {
            color: #5be9ff
        }
        .chip.lvl {
            color: #ffb0ff
        }
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: #000;
            cursor: pointer;
            font-family: 'Orbitron';
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 12px var(--neon-blue);
            position: relative;
            font-size: 1.2rem
        }
        .avatar .verify {
            position: absolute;
            bottom: -4px;
            right: -4px;
            font-size: .75rem;
            color: #1da1f2;
            background: #000;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #1da1f2
        }
        .page {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            animation: fadeIn .4s ease
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px)
            }
            to {
                opacity: 1;
                transform: none
            }
        }
        .grid {
            display: grid;
            gap: 18px
        }
        .g2 {
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr))
        }
        .g3 {
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr))
        }
        .g4 {
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr))
        }
        .card {
            padding: 22px;
            border-radius: 20px;
            transition: transform .3s, box-shadow .3s;
            transform-style: preserve-3d;
            background: var(--glass);
            backdrop-filter: blur(14px);
            border: 1px solid var(--glass-brd)
        }
        .card:hover {
            transform: translateY(-4px) rotateX(2deg) rotateY(-2deg);
            box-shadow: 0 20px 40px rgba(0, 229, 255, .25), 0 0 40px rgba(180, 0, 255, .25)
        }
        .card h3 {
            font-family: 'Orbitron';
            margin-bottom: 8px;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent
        }
        .card p {
            color: var(--muted);
            font-size: .92rem;
            line-height: 1.5
        }
        .hero {
            padding: 36px;
            border-radius: 26px;
            background: linear-gradient(135deg, rgba(0, 229, 255, .15), rgba(180, 0, 255, .15));
            border: 1px solid var(--glass-brd);
            position: relative;
            overflow: hidden;
            margin-bottom: 22px
        }
        .hero::before {
            content: "";
            position: absolute;
            inset: -2px;
            background: conic-gradient(from 0deg, transparent, var(--neon-blue), transparent, var(--neon-purple), transparent);
            animation: spin 8s linear infinite;
            z-index: -1;
            filter: blur(20px);
            opacity: .6
        }
        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
        .hero h2 {
            font-family: 'Orbitron';
            font-size: 2rem;
            margin-bottom: 8px
        }
        .hero p {
            color: var(--muted);
            max-width: 600px
        }
        .modal-back {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .7);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn .2s
        }
        .modal {
            width: min(560px, 100%);
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px
        }
        .modal h2 {
            font-family: 'Orbitron';
            margin-bottom: 14px;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent
        }
        .close-x {
            float: left;
            cursor: pointer;
            font-size: 1.6rem;
            color: var(--muted)
        }
        .close-x:hover {
            color: var(--bad)
        }
        #toasts {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 10px
        }
        .toast {
            padding: 12px 18px;
            border-radius: 12px;
            background: var(--glass);
            border: 1px solid var(--glass-brd);
            backdrop-filter: blur(20px);
            box-shadow: var(--shadow-neon);
            animation: slideIn .3s;
            font-weight: 700;
            min-width: 220px
        }
        .toast.good {
            border-color: var(--good)
        }
        .toast.bad {
            border-color: var(--bad)
        }
        .toast.gold {
            border-color: var(--gold)
        }
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0
            }
            to {
                transform: none;
                opacity: 1
            }
        }
        .chatbox {
            display: flex;
            flex-direction: column;
            height: 360px;
            padding: 14px
        }
        .chat-msgs {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 6px
        }
        .msg {
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .05);
            max-width: 80%;
            font-size: .9rem;
            animation: fadeIn .2s
        }
        .msg .who {
            color: var(--neon-blue);
            font-weight: 700;
            margin-inline-end: 6px
        }
        .chat-input {
            display: flex;
            gap: 8px;
            margin-top: 8px
        }
        .bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, .06);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-brd)
        }
        .bar>div {
            height: 100%;
            background: var(--grad);
            border-radius: 20px;
            transition: width .4s;
            box-shadow: 0 0 12px var(--neon-blue)
        }
        table {
            width: 100%;
            border-collapse: collapse
        }
        th,
        td {
            padding: 10px 12px;
            text-align: right;
            border-bottom: 1px solid var(--glass-brd);
            font-size: .92rem
        }
        th {
            color: var(--neon-blue);
            font-family: 'Orbitron';
            font-size: .85rem;
            letter-spacing: 1px
        }
        tr:hover td {
            background: rgba(255, 255, 255, .03)
        }
        .room-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--glass-brd);
            margin-bottom: 8px;
            transition: .2s
        }
        .room-item:hover {
            background: rgba(0, 229, 255, .08);
            transform: translateX(-4px)
        }
        .event-card {
            padding: 26px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(180, 0, 255, .25), rgba(255, 43, 214, .15));
            border: 2px solid var(--neon-purple);
            text-align: center;
            animation: pulse 2s infinite, scaleIn .5s;
            box-shadow: 0 0 40px rgba(180, 0, 255, .6)
        }
        @keyframes pulse {
            0%,
            100% {
                box-shadow: 0 0 30px rgba(180, 0, 255, .5)
            }
            50% {
                box-shadow: 0 0 60px rgba(0, 229, 255, .7)
            }
        }
        @keyframes scaleIn {
            from {
                transform: scale(.7);
                opacity: 0
            }
            to {
                transform: scale(1);
                opacity: 1
            }
        }
        .event-card h2 {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            margin-bottom: 8px
        }
        .timer {
            font-family: 'Orbitron';
            font-size: 3rem;
            text-align: center;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px rgba(0, 229, 255, .5)
        }
        .player-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .04);
            margin-bottom: 6px;
            border: 1px solid var(--glass-brd)
        }
        .player-row.top {
            border-color: gold;
            background: linear-gradient(90deg, rgba(255, 215, 0, .15), transparent)
        }
        .player-row .dev-badge {
            background: linear-gradient(135deg, #1da1f2, #0d8bd9);
            color: #fff;
            padding: 1px 8px;
            border-radius: 12px;
            font-size: .7rem;
            font-weight: 700;
            margin-inline-start: 6px
        }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 700;
            background: var(--grad);
            color: #000
        }
        .badge.gold {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000
        }
        .badge.verified {
            background: #1da1f2;
            color: #fff
        }
        .welcome-anim {
            text-align: center;
            padding: 40px
        }
        .welcome-anim h1 {
            font-family: 'Orbitron';
            font-size: 2.4rem;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            animation: glow 2s ease-in-out infinite alternate
        }
        @keyframes glow {
            from {
                filter: drop-shadow(0 0 10px var(--neon-blue))
            }
            to {
                filter: drop-shadow(0 0 25px var(--neon-purple))
            }
        }
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px
        }
        ::-webkit-scrollbar-track {
            background: transparent
        }
        ::-webkit-scrollbar-thumb {
            background: var(--grad);
            border-radius: 4px
        }
        .hidden {
            display: none !important
        }
        .row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap
        }
        .stat {
            display: flex;
            flex-direction: column;
            padding: 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--glass-brd)
        }
        .stat .v {
            font-family: 'Orbitron';
            font-size: 1.6rem;
            background: var(--grad);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent
        }
        .stat .l {
            color: var(--muted);
            font-size: .85rem
        }
        .avatar-picker {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin: 12px 0
        }
        .ap {
            aspect-ratio: 1;
            border-radius: 12px;
            background: var(--grad);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Orbitron';
            font-weight: 900;
            color: #000;
            cursor: pointer;
            border: 2px solid transparent;
            font-size: 1.4rem
        }
        .ap.sel {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue)
        }

        /* Challenge UI */
        .challenge-display {
            padding: 24px;
            border-radius: 24px;
            background: linear-gradient(145deg, rgba(0, 229, 255, .08), rgba(180, 0, 255, .08));
            border: 2px solid var(--glass-brd);
            margin-bottom: 20px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center
        }
        .challenge-display .cat-tag {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 700;
            background: var(--grad);
            color: #000;
            margin-bottom: 12px
        }
        .challenge-display h2 {
            font-family: 'Orbitron';
            font-size: 1.8rem;
            margin-bottom: 8px
        }
        .challenge-display .desc {
            color: var(--muted);
            font-size: 1.05rem;
            max-width: 600px
        }
        .challenge-interact {
            padding: 20px;
            border-radius: 20px;
            background: rgba(255, 255, 255, .03);
            border: 1px solid var(--glass-brd);
            margin-top: 14px;
            min-height: 120px
        }
        .vote-options {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center
        }
        .vote-options .btn {
            min-width: 100px
        }
        .question-box {
            padding: 16px;
            border-radius: 16px;
            background: rgba(0, 229, 255, .05);
            border: 1px solid var(--glass-brd);
            margin: 8px 0
        }
        .question-box .q {
            font-size: 1.1rem;
            font-weight: 700
        }
        .question-box .q-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 10px
        }
        .question-box .q-options .btn {
            min-width: 80px
        }
        .player-answer-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 12px;
            border-radius: 10px;
            background: rgba(255, 255, 255, .03);
            margin-bottom: 6px;
            border: 1px solid var(--glass-brd)
        }
        .player-answer-row .status {
            font-size: 1.2rem
        }
        .chaos-effect {
            font-size: 2.5rem;
            animation: scaleIn .6s
        }
        .stream-race {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center
        }
        .stream-race .racer {
            padding: 12px 20px;
            border-radius: 14px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--glass-brd);
            text-align: center;
            min-width: 100px
        }
        .stream-race .racer .name {
            font-weight: 700
        }
        .stream-race .racer .score {
            font-family: 'Orbitron';
            font-size: 1.6rem;
            color: var(--neon-blue)
        }
        .reward-popup {
            font-size: 3rem;
            animation: scaleIn .5s
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <canvas id="particles"></canvas>
    <div id="mouse-light"></div>

    <div id="app"></div>
    <div id="toasts"></div>

    <script>
        /* ============================================================
           يلا بينا — Live Party Challenge Platform
           ============================================================ */

        /* ---------- Storage ---------- */
        const DB = {
            key: 'yalla_db_v2',
            data: null,
            load() {
                try { this.data = JSON.parse(localStorage.getItem(this.key)) || this.default(); } catch (e) { this.data =
                        this.default(); }
                return this.data;
            },
            default() {
                return {
                    users: {},
                    emails: {},
                    session: null,
                    rooms: {},
                    chat: {},
                    settings: { music: .4, sfx: .6, muted: false },
                    // legacy: leaderboard computed on the fly
                };
            },
            save() { localStorage.setItem(this.key, JSON.stringify(this.data)); },
        };
        DB.load();
        setInterval(() => DB.save(), 3000);

        /* ---------- Utilities ---------- */

                o.frequency.value = freq;

                o.connect(g);
                g.connect(this.ctx.destination);

                g.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + dur);
                o.stop(this.ctx.currentTime + dur);

            const c = $('#particles'),

            function resize() { c.width = innerWidth;
                c.height = innerHeight;
                bc.width = innerWidth;
                bc.height = innerHeight; }
            resize();
            addEventListener('resize', resize);
            const parts = Array.from({ length: 60 }, () => ({
                x: Math.random() * innerWidth,
                y: Math.random() * innerHeight,
                vx: (Math.random() - .5) * .4,
                vy: (Math.random() - .5) * .4,
                r: Math.random() * 2 + 1,
                c: Math.random() > .5 ? '0,229,255' : '180,0,255'
            }));

            function loop() {
                ctx.clearRect(0, 0, c.width, c.height);
                parts.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    if (p.x < 0 || p.x > c.width) p.vx *= -1;
                    if (p.y < 0 || p.y > c.height) p.vy *= -1;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.c},.8)`;
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = `rgba(${p.c},1)`;
                    ctx.fill();
                });
                requestAnimationFrame(loop);
            }
            loop();
            const ml = $('#mouse-light');
            addEventListener('mousemove', e => { ml.style.left = e.clientX + 'px';
                ml.style.top = e.clientY + 'px' });
        })();

            join(code, player) {
                const r = DB.data.rooms[code];
                if (!r) throw new Error('الغرفة غير موجودة');
                if (r.players.find(p => p.name === player)) return r;
                if (r.players.length >= r.maxPlayers) throw new Error('الغرفة ممتلئة');
                r.players.push({ name: player, bot: false, score: 0 });
                DB.save();
                return r;
            },
            leave(code, player) {
                const r = DB.data.rooms[code];

            // --- Voting implementations ---
            voteKick(g) {
                const target = pick(g.players.filter(p => !p.bot));
                if (!target) return;
                g.log(`${target.name} تم طرده!`);
                g.players = g.players.filter(p => p.name !== target.name);
                g.kicked = target.name;
            },
            voteSteal(g) {
                const t = pick(g.players.filter(p => !p.bot));
                if (!t) return;
                const u = Auth.current();
                if (u && t.name === u.username) { g.log(`سرقة من ${t.name} فشلت!`); return; }
                t.score = Math.max(0, t.score - 50);
                g.log(`${t.name} خسر 50 نقطة!`);
            },
            voteGive(g) {
                const t = pick(g.players.filter(p => !p.bot));
                if (!t) return;
                t.score += 30;
                g.log(`${t.name} حصل على 30 نقطة!`);
            },
            voteSwap(g) {
                const list = g.players.filter(p => !p.bot);
                if (list.length < 2) return;
                const [a, b] = [pick(list), pick(list)];
                if (a === b) return;
                const tmp = a.score;
                a.score = b.score;
                b.score = tmp;
                g.log(`${a.name} و ${b.name} تم تبديل نقاطهم!`);
            },
            voteMute(g) {
                const t = pick(g.players.filter(p => !p.bot));
                if (!t) return;
                t.muted = true;
                g.log(`${t.name} تم كتمه!`);
            },
            voteProtect(g) {
                const t = pick(g.players.filter(p => !p.bot));
                if (!t) return;
                t.protected = true;
                g.log(`${t.name} محمي!`);
            },
            voteFunny(g) {
                const t = pick(g.players.filter(p => !p.bot));
                if (!t) return;
                t.score += 20;
                g.log(`${t.name} أطرف لاعب! +20`);
            },
            voteUnlucky(g) {
                const t = pick(g.players.filter(p => !p.bot));
                if (!t) return;
                t.score = Math.max(0, t.score - 15);
                g.log(`${t.name} أكثر لاعب حظ سيء! -15`);
            },
            voteReverse(g) {
                const scores = g.players.map(p => p.score).sort((a, b) => a - b);
                g.players.forEach((p, i) => p.score = scores[scores.length - 1 - i]);
                g.log('تم عكس الترتيب!');
            },
            voteDouble(g) {
                const t = pick(g.players.filter(p => !p.bot));
                if (!t) return;
                t.score *= 2;
                g.log(`${t.name} تضاعفت نقاطه!`);
            },
            voteHalf(g) {
                const t = pick(g.players.filter(p => !p.bot));
                if (!t) return;
                t.score = Math.floor(t.score / 2);
                g.log(`${t.name} تنصفت نقاطه!`);
            },

            // --- Question system ---
            getQuestionForPlayer(g, p) {
                const available = this.questions.filter(q => !g.usedQuestions.includes(q.q) && !g.usedQuestions.includes(q
                    .q + p.name));
                if (available.length === 0) {
                    g.usedQuestions = [];
                    return pick(this.questions);
                }
                const q = pick(available);
                g.usedQuestions.push(q.q + p.name);
                return q;
            },

            pEmoji(g, p) {

            pOpposite(g, p) {

            // --- Chaos implementations ---
            cReverse(g) {
                const scores = g.players.map(p => p.score).sort((a, b) => a - b);
                g.players.forEach((p, i) => p.score = scores[scores.length - 1 - i]);
                g.log('تم عكس الترتيب!');

            cSwap(g) {
                const list = g.players.filter(p => !p.bot);
                if (list.length < 2) return;
                const [a, b] = [pick(list), pick(list)];
                if (a === b) return;
                const tmp = a.score;
                a.score = b.score;
                b.score = tmp;
                g.log(`${a.name} و ${b.name} تبادلوا النقاط!`);
            },
            cHalf(g) {
                g.players.forEach(p => {
                    if (!p.bot) p.score = Math.floor(p.score / 2);
                });
                g.log('تم تنصيف نقاط الجميع!');
            },
            cBox(g) {
                g.players.forEach(p => {
                    if (!p.bot) {
                        const r = Math.random();
                        if (r < .3) { p.score += 30;
                            g.log(`${p.name} حصل على 30 نقطة من الصندوق!`); } else if (r < .6) { p.score += 10;
                            g.log(`${p.name} حصل على 10 نقاط!`); } else { p.score = Math.max(0, p.score - 10);
                            g.log(`${p.name} خسر 10 نقاط!`); }

            },
            cKing(g) {
                const p = pick(g.players.filter(p => !p.bot));

            cLastFirst(g) {
                const sorted = [...g.players].sort((a, b) => a.score - b.score);
                if (sorted.length < 2) return;

                    first = sorted[sorted.length - 1];
                const tmp = last.score;
                last.score = first.score;
                first.score = tmp;
                g.log(`${last.name} أصبح الأول! ${first.name} أصبح الأخير!`);
            },
            cChaosAll(g) {
                g.players.forEach(p => {
                    if (!p.bot) p.score = Math.max(0, p.score + Math.floor((Math.random() - .5) * 80));
                });
                g.log('فوضى شاملة! الجميع تغيرت نقاطهم!');
            },
            cStealAll(g) {
                const bots = g.players.filter(p => p.bot);
                const humans = g.players.filter(p => !p.bot);
                humans.forEach(h => {
                    const target = pick(humans.filter(p => p.name !== h.name));
                    if (target) { const steal = Math.min(10, target.score);

            cGiftAll(g) {

            },

            // --- Stream implementations ---
            sFastest(g) {
                const humans = g.players.filter(p => !p.bot);
                humans.forEach(p => { p.score += Math.floor(Math.random() * 20) + 10; });
                const winner = humans.reduce((a, b) => a.score > b.score ? a : b);

            sLast(g) {

                loser.score = Math.max(0, loser.score - 20);

            sVoteAll(g) {

            sSecret(g) {

            sSurvive(g) {

            sSpin(g) {

            // --- Punishment implementations ---
            uLoseCoins(g, p) {

                const u = Auth.current();
                if (u && p.name === u.username && hasUnlimited(u)) { g.log(`المؤسس محمي!`); return; }

                if (u && p.name === u.username && hasUnlimited(u)) { g.log(`المؤسس محمي!`); return; }
                // In the game, gems are tracked separately; we'll deduct from the user's actual account after the game
                p.gemsLost = (p.gemsLost || 0) + 2;

            uFreeze(g, p) {

            // --- Reward implementations ---
            rJackpot(g, p) {

                g.log(`${p.name} فاز بـ 200 نقطة! 🎰`);
            },
            rDoubleCoins(g, p) {

            },
            rBonusXP(g, p) {

            },
            rFreeGems(g, p) {

            },
            rSecret(g, p) {

            },
            rLucky(g, p) {

                const prize = pick(prizes);
                p.score += prize;
                g.log(`${p.name} حصل على ${prize} نقطة من عجلة الحظ! 🍀`);
            },
            rKingBonus(g, p) {
                const sorted = [...g.players].sort((a, b) => b.score - a.score);
                if (sorted.length > 0) {
                    sorted[0].score += 40;
                    g.log(`${sorted[0].name} (الملك) حصل على 40 نقطة!`);
                }
            },

            // --- Main engine ---
            reset(g) {
                this.history = [];
                this.round = 0;
                this.timer = 30;
                this.state = 'idle';
                this.players = g.players.map(p => ({ ...p, score: p.score || 0, protected: false, muted: false,
                    frozen: false, noVote: false, redName: false, tempName: null, gemsLost: 0, gemsBonus: 0,
                    xpBonus: 0 }));
                this.usedQuestions = [];
                this.usedPersonal = [];
                this.currentChallenge = null;
                this.votes = {};
                this.answers = {};
                this.results = {};
                this.multiplier = 1;
                this.logs = [];
                this.gameOver = false;
                this.personalTargets = {};
                g.logs = this.logs;
                this.players.forEach(p => { if (p.bot) p.skill = .3 + Math.random() * .7; });
            },

            next(g) {
                if (this.round >= this.maxRounds) { this.gameOver = true; return null; }
                this.round++;

                // Reset per-round flags
                this.players.forEach(p => { p.protected = false;
                    p.muted = false;
                    p.frozen = false;
                    p.noVote = false;
                    p.redName = false;
                    p.tempName = null; });

                // Select challenge category with weights
                const cats = [
                    { cat: 'voting', pool: this.voting, weight: 25 },
                    { cat: 'questions', pool: this.questions, weight: 20 },
                    { cat: 'personal', pool: this.personal, weight: 20 },
                    { cat: 'chaos', pool: this.chaos, weight: 15 },
                    { cat: 'stream', pool: this.stream, weight: 10 },
                    { cat: 'punishment', pool: this.punishment, weight: 5 },
                    { cat: 'reward', pool: this.reward, weight: 5 },
                ];

                // Weighted random
                let total = cats.reduce((s, c) => s + c.weight, 0);
                let r = Math.random() * total;
                let chosenCat = cats[0];
                for (const c of cats) { r -= c.weight; if (r <= 0) { chosenCat = c; break; } }

                // Pick challenge from pool, avoid repeats
                let pool = chosenCat.pool;
                let challenge = null;
                let attempts = 0;
                while (attempts < 10) {
                    const candidate = pick(pool);
                    if (!this.history.includes(candidate.id) || this.history.length > 5) {
                        challenge = candidate;
                        break;
                    }
                    attempts++;
                }
                if (!challenge) challenge = pick(pool);

                this.history.push(challenge.id);
                if (this.history.length > 10) this.history.shift();

                this.currentChallenge = challenge;
                this.state = challenge.cat;

                // For questions: assign different question to each player
                if (challenge.cat === 'questions') {
                    this.players.forEach(p => {
                        if (!p.bot) {
                            const q = this.getQuestionForPlayer(g, p);
                            p._question = q;
                        }
                    });
                    g.usedQuestions = this.usedQuestions;
                }

                // For personal: assign different challenge to each player
                if (challenge.cat === 'personal') {
                    this.players.forEach(p => {
                        if (!p.bot) {
                            challenge.fn(g, p);
                        }
                    });
                }

                // For voting: randomize target
                if (challenge.cat === 'voting') {
                    challenge.fn(g);
                }

                // For chaos: apply immediately
                if (challenge.cat === 'chaos') {
                    challenge.fn(g);
                }

                // For stream: apply immediately
                if (challenge.cat === 'stream') {
                    challenge.fn(g);
                }

                // For punishment: target a random player
                if (challenge.cat === 'punishment') {
                    const target = pick(this.players.filter(p => !p.bot && !p.protected));
                    if (target) challenge.fn(g, target);
                    else g.log('لا يوجد لاعب مستهدف');
                }

                // For reward: target a random player
                if (challenge.cat === 'reward') {
                    const target = pick(this.players.filter(p => !p.bot));
                    if (target) challenge.fn(g, target);
                    else g.log('لا يوجد لاعب مستهدف');
                }

                // Bot actions: simple AI
                this.players.forEach(p => {
                    if (p.bot) {
                        const gain = Math.floor(p.skill * 25 + Math.random() * 15);
                        p.score += gain * this.multiplier;
                    }
                });

                // Human auto small gain for participation
                this.players.forEach(p => {
                    if (!p.bot) {
                        p.score += Math.floor(Math.random() * 6) + 2;
                    }
                });

                g.players = this.players;
                this.logs.push(`الجولة ${this.round}: ${challenge.name} — ${challenge.desc}`);
                g.logs = this.logs;
                g.multiplier = this.multiplier;

                return challenge;
            },

            // Check if player answered correctly (for questions)
            answerQuestion(p, answer) {
                if (!p._question) return false;
                const correct = p._question.answer === answer;
                if (correct) {
                    p.score += 15 * this.multiplier;
                    this.logs.push(`${p.name} أجاب بشكل صحيح! +15`);
                    Sound.reward();
                } else {
                    p.score = Math.max(0, p.score - 10);
                    this.logs.push(`${p.name} أجاب بشكل خاطئ! -10`);
                    Sound.boo();
                }
                p._question = null;
                return correct;
            },

            // For personal challenge completion
            completePersonal(p, result) {
                const target = this.personalTargets?.[p.name];
                if (!target || target.done) return;
                target.done = true;
                if (result) {
                    p.score += 20 * this.multiplier;
                    this.logs.push(`${p.name} أكمل التحدي! +20`);
                    Sound.reward();
                } else {
                    p.score = Math.max(0, p.score - 15);
                    this.logs.push(`${p.name} فشل في التحدي! -15`);
                    Sound.boo();
                }
            },

            // For voting: record vote
            recordVote(p, option) {
                if (p.noVote || p.muted) { this.logs.push(`${p.name} لا يستطيع التصويت`); return; }
                this.votes[p.name] = option;
                Sound.vote();
            },

            // Process voting results
            processVotes(g) {
                if (!this.voteTarget) return;
                const votes = Object.values(this.votes);
                const counts = {};
                this.voteTarget.options.forEach(o => counts[o] = 0);
                votes.forEach(v => { if (counts[v] !== undefined) counts[v]++; });
                let max = 0,
                    winner = null;
                for (const [k, v] of Object.entries(counts)) { if (v > max) { max = v;
                        winner = k; } }
                if (winner === this.voteTarget.correct) {
                    // Everyone who voted correctly gets a reward
                    for (const [name, vote] of Object.entries(this.votes)) {
                        if (vote === winner) {
                            const p = this.players.find(p => p.name === name);
                            if (p) { p.score += 10;
                                this.logs.push(`${name} صوت بشكل صحيح! +10`); }
                        }
                    }
                } else {
                    // Everyone who voted wrong gets a small penalty
                    for (const [name, vote] of Object.entries(this.votes)) {
                        if (vote !== winner) {
                            const p = this.players.find(p => p.name === name);
                            if (p) { p.score = Math.max(0, p.score - 5);
                                this.logs.push(`${name} صوت بشكل خاطئ! -5`); }
                        }
                    }
                }
                this.votes = {};
                this.voteTarget = null;
            },

            // Process secret number guess
            processSecret(g) {
                if (!this.secretNumber) return;
                const humans = this.players.filter(p => !p.bot);
                humans.forEach(p => {
                    const guess = p._secretGuess;
                    if (guess === this.secretNumber) { p.score += 30;
                        this.logs.push(`${p.name} خمن الرقم الصحيح! +30`);
                        Sound.reward(); } else if (guess !== undefined) { p.score = Math.max(0, p.score - 10);
                        this.logs.push(`${p.name} خمن خطأ! -10`);
                        Sound.boo(); }
                    p._secretGuess = undefined;
                });
                this.secretNumber = null;
            },

            // Process color guess
            processColor(g) {
                if (!this.colorTarget) return;
                const humans = this.players.filter(p => !p.bot);
                humans.forEach(p => {
                    const guess = p._colorGuess;
                    if (guess === this.colorTarget.correct) { p.score += 20;
                        this.logs.push(`${p.name} اختار اللون الصحيح! +20`);
                        Sound.reward(); } else if (guess !== undefined) { p.score = Math.max(0, p.score - 8);
                        this.logs.push(`${p.name} اختار لون خاطئ! -8`);
                        Sound.boo(); }
                    p._colorGuess = undefined;
                });
                this.colorTarget = null;
            },

            // Process survive
            processSurvive(g) {
                if (!this.surviveTarget) return;
                const humans = this.players.filter(p => !p.bot);
                humans.forEach(p => {
                    const time = p._surviveTime;
                    if (time !== undefined && Math.abs(time - this.surviveTarget.time) < 0.5) {
                        p.score += 25;
                        this.logs.push(`${p.name} نجى في الوقت المناسب! +25`);
                        Sound.reward();
                    } else if (time !== undefined) {
                        p.score = Math.max(0, p.score - 10);
                        this.logs.push(`${p.name} فشل في النجاة! -10`);
                        Sound.boo();
                    }
                    p._surviveTime = undefined;
                });
                this.surviveTarget = null;
            },

            // Process spin
            processSpin(g) {
                if (!this.spinResult) return;
                const humans = this.players.filter(p => !p.bot);
                humans.forEach(p => {
                    if (this.spinResult === '50 عملة') p.score += 50;
                    else if (this.spinResult === '100 عملة') p.score += 100;
                    else if (this.spinResult === '2 جواهر') { p.gemsBonus = (p.gemsBonus || 0) + 2;
                        this.logs.push(`${p.name} حصل على 2 جواهر!`); } else if (this.spinResult === '5 جواهر') { p
                            .gemsBonus = (p.gemsBonus || 0) + 5;
                        this.logs.push(`${p.name} حصل على 5 جواهر!`); } else if (this.spinResult === 'مضاعفة النقاط') { p
                            .score *= 2;
                        this.logs.push(`${p.name} تضاعفت نقاطه!`); } else { this.logs.push(`${p.name} لم يحصل على شيء`);
                    }
                    Sound.reward();
                });
                this.spinResult = null;
            },

            // --- Get challenge for display ---

        /* ---------- PARTY GAME ---------- */
        function startParty(room) {
            PartyEngine.reset({ players: room.players.map(p => ({ ...p, score: 0 })) });
            const g = {
                room,
                players: room.players.map(p => ({ ...p, score: 0 })),
                round: 0,
                maxRounds: 8,
                multiplier: 1,
                logs: [],
                usedQuestions: [],
            };
            state.game = g;
            state.view = 'play';
            render();
            runPartyRound();
        }

        function runPartyRound() {
            const g = state.game;
            if (!g) return;
            const engine = PartyEngine;
            const challenge = engine.next(g);
            if (!challenge || engine.isGameOver()) { endPartyGame(); return; }

            g.currentChallenge = challenge;
            g.players = engine.getPlayers();
            g.logs = engine.getLogs();
            g.round = engine.getRound();
            g.multiplier = engine.multiplier;

            renderPlay();

            // Timer
            engine.timer = 30;
            clearInterval(g._iv);
            g._iv = setInterval(() => {
                engine.timer--;
                const t = $('#timer');
                if (t) t.textContent = engine.timer;
                if (engine.timer <= 0) {
                    clearInterval(g._iv);
                    // Process pending votes/answers
                    engine.processVotes(g);
                    engine.processSecret(g);
                    engine.processColor(g);
                    engine.processSurvive(g);
                    engine.processSpin(g);
                    // Update players
                    g.players = engine.getPlayers();
                    g.logs = engine.getLogs();
                    renderPlay();
                    // Next round after a short delay
                    setTimeout(() => { if (state.view === 'play') runPartyRound(); }, 500);
                }
            }, 1000);
        }

        routes.play = (page) => { renderPlayInto(page); };

        function renderPlay() {
            const p = $('#page');
            if (p) { p.innerHTML = '';
                renderPlayInto(p); }
        }

        function renderPlayInto(page) {
            const g = state.game;
            if (!g) return;
            const engine = PartyEngine;
            const challenge = engine.getCurrentChallenge();
            const players = engine.getPlayers();
            const sorted = [...players].sort((a, b) => b.score - a.score);
            const isF = Auth.isFounder(Auth.current());

            // Challenge display
            const challengeEl = el('div', { class: 'challenge-display' });
            if (challenge) {
                challengeEl.append(
                    el('span', { class: 'cat-tag' }, challenge.cat || 'تحدي'),
                    el('h2', {}, challenge.name || ''),
                    el('p', { class: 'desc' }, challenge.desc || '')
                );
            } else {
                challengeEl.append(el('p', { style: 'color:var(--muted)' }, 'جاري التحضير...'));
            }
            page.append(challengeEl);

            // Timer
            page.append(el('div', { class: 'timer', id: 'timer' }, String(engine.timer || 30)));

            // Interaction area
            const interact = el('div', { class: 'challenge-interact' });
            const stateType = engine.getState();

            // --- Voting ---
            if (stateType === 'voting') {
                const target = engine.getVoteTarget();
                if (target) {
                    interact.append(el('p', { style: 'color:var(--muted);margin-bottom:12px' }, 'صوّت على الخيار الصحيح:'));
                    const opts = el('div', { class: 'vote-options' });
                    target.options.forEach(o => {
                        opts.append(el('button', { class: 'btn', onclick: () => {
                                const u = Auth.current();
                                const p = players.find(p => p.name === u.username);
                                if (p) { engine.recordVote(p, o);
                                    toast(`صوت لـ ${o}`, 'good');
                                    Sound.vote(); }
                            } }, o));
                    });
                    interact.append(opts);
                }
            }

            // --- Questions ---
            else if (stateType === 'questions') {
                const u = Auth.current();
                const p = players.find(p => p.name === u.username);
                const q = p ? engine.getQuestion(p) : null;
                if (q) {
                    interact.append(el('div', { class: 'question-box' },
                        el('div', { class: 'q' }, q.q),
                        el('div', { class: 'q-options' }, ...q.options.map(o =>
                            el('button', { class: 'btn sm', onclick: () => {
                                    if (p) {
                                        const correct = engine.answerQuestion(p, o);
                                        toast(correct ? '✅ إجابة صحيحة!' : '❌ إجابة خاطئة!', correct ?
                                            'good' : 'bad');
                                        if (correct) Sound.reward();
                                        else Sound.boo();
                                        renderPlay();
                                    }
                                } }, o)
                        ))
                    ));
                } else {
                    interact.append(el('p', { style: 'color:var(--muted)' }, 'انتظر دورك...'));
                }
            }

            // --- Personal ---
            else if (stateType === 'personal') {
                const u = Auth.current();
                const p = players.find(p => p.name === u.username);
                const target = p ? engine.getPersonalTarget(p) : null;
                if (target && !target.done) {
                    let msg = '';
                    let action = null;
                    if (target.type === 'type') msg = `اكتب: "${target.word}"`;
                    else if (target.type === 'guess') msg = `خمن الرقم بين 1 و 100`;
                    else if (target.type === 'click') msg = `اضغط على زر "${target.color}"`;
                    else if (target.type === 'puzzle') msg = target.puzzle;
                    else if (target.type === 'memorize') msg = `تذكر: ${target.symbols.join(' ')}`;
                    else if (target.type === 'hidden') msg = `اعثر على: "${target.object}"`;
                    else if (target.type === 'timer') msg = 'أجب في أقل من 5 ثواني!';
                    else if (target.type === 'exact') msg = 'اضغط بعد 3 ثواني بالضبط!';
                    else if (target.type === 'emoji') msg = `ماذا يعني: ${target.emoji}`;
                    else if (target.type === 'opposite') msg = `عكس: "${target.word}"`;

                    interact.append(el('p', { style: 'font-weight:700' }, msg));
                    if (target.type === 'exact') {
                        let startTime = Date.now();
                        interact.append(el('button', { class: 'btn primary', onclick: () => {
                                const elapsed = (Date.now() - startTime) / 1000;
                                if (p) {
                                    p._surviveTime = elapsed;
                                    const diff = Math.abs(elapsed - 3);
                                    if (diff < 0.5) { toast('🎯 بالضبط!', 'good');
                                        Sound.reward();
                                        engine.completePersonal(p, true); } else { toast(`⏱️ فرق ${diff.toFixed(1)} ثانية`,
                                            'bad');
                                        Sound.boo();
                                        engine.completePersonal(p, false); }
                                    renderPlay();
                                }
                            } }, 'اضغط الآن!'));
                    } else if (target.type === 'type') {
                        const inp = el('input', { class: 'input', placeholder: 'اكتب...', onkeydown: (e) => {
                                if (e.key === 'Enter' && inp.value.trim()) {
                                    const ok = inp.value.trim() === target.word;
                                    if (p) {
                                        if (ok) { toast('✅ صحيح!', 'good');
                                            Sound.reward();
                                            engine.completePersonal(p, true); } else { toast('❌ خطأ!',
                                            'bad');
                                            Sound.boo();
                                            engine.completePersonal(p, false); }
                                        renderPlay();
                                    }
                                }
                            } });
                        interact.append(inp);
                    } else if (target.type === 'guess') {
                        const inp = el('input', { class: 'input', type: 'number', placeholder: 'خمن...',
                            onkeydown: (e) => {
                                if (e.key === 'Enter' && inp.value) {
                                    const guess = parseInt(inp.value);
                                    if (p) {
                                        if (guess === target.number) { toast('✅ صحيح!', 'good');
                                            Sound.reward();
                                            engine.completePersonal(p, true); } else { toast(
                                                `❌ خطأ! الرقم كان ${target.number}`, 'bad');
                                            Sound.boo();
                                            engine.completePersonal(p, false); }
                                        renderPlay();
                                    }
                                }
                            } });
                        interact.append(inp);
                    } else if (target.type === 'click') {
                        const colors = ['أحمر', 'أزرق', 'أخضر', 'أصفر', 'بنفسجي', 'برتقالي'];
                        const opts = el('div', { class: 'q-options' });
                        colors.forEach(c => {
                            opts.append(el('button', { class: 'btn sm', style: `background:${c === 'أحمر' ? '#ff0000' : c === 'أزرق' ? '#0055ff' : c === 'أخضر' ? '#00aa00' : c === 'أصفر' ? '#ffaa00' : c === 'بنفسجي' ? '#aa00ff' : '#ff8800'};color:#fff`,
                                    onclick: () => {
                                        if (p) {
                                            const ok = c === target.color;
                                            if (ok) { toast('✅ صحيح!', 'good');
                                                Sound.reward();
                                                engine.completePersonal(p, true); } else { toast(
                                                    `❌ خطأ! اللون الصحيح ${target.color}`,
                                                    'bad');
                                                Sound.boo();
                                                engine.completePersonal(p, false); }
                                            renderPlay();
                                        }
                                    } }, c));
                        });
                        interact.append(opts);
                    } else if (target.type === 'memorize') {
                        interact.append(el('p', { style: 'color:var(--muted)' }, 'اضغط "تم" عندما تتذكرها:'));
                        interact.append(el('button', { class: 'btn primary', onclick: () => {
                                if (p) {
                                    const ok = confirm(`هل تذكرت: ${target.symbols.join(' ')}؟`);
                                    if (ok) { toast('✅ تذكرت!', 'good');
                                        Sound.reward();
                                        engine.completePersonal(p, true); } else { toast('❌ نسيت!',
                                            'bad');
                                        Sound.boo();
                                        engine.completePersonal(p, false); }
                                    renderPlay();
                                }
                            } }, 'تم'));
                    } else if (target.type === 'emoji') {
                        const meanings = ['سعيد', 'حزين', 'غاضب', 'خائف', 'متفكر', 'رائع', 'محتفل', 'نائم'];
                        const opts = el('div', { class: 'q-options' });
                        shuffle(meanings).slice(0, 4).forEach(m => {
                            opts.append(el('button', { class: 'btn sm', onclick: () => {
                                    if (p) {
                                        const ok = m === target.meaning;
                                        if (ok) { toast('✅ صحيح!', 'good');
                                            Sound.reward();
                                            engine.completePersonal(p, true); } else { toast(
                                                `❌ خطأ! المعنى الصحيح ${target.meaning}`,
                                                'bad');
                                            Sound.boo();
                                            engine.completePersonal(p, false); }
                                        renderPlay();
                                    }
                                } }, m));
                        });
                        interact.append(opts);
                    } else if (target.type === 'opposite') {
                        const inp = el('input', { class: 'input', placeholder: 'اكتب العكس...', onkeydown: (e) => {
                                if (e.key === 'Enter' && inp.value.trim()) {
                                    const ok = inp.value.trim() === target.answer;
                                    if (p) {
                                        if (ok) { toast('✅ صحيح!', 'good');
                                            Sound.reward();
                                            engine.completePersonal(p, true); } else { toast(
                                                `❌ خطأ! العكس هو ${target.answer}`, 'bad');
                                            Sound.boo();
                                            engine.completePersonal(p, false); }
                                        renderPlay();
                                    }
                                }
                            } });
                        interact.append(inp);
                    } else if (target.type === 'puzzle' || target.type === 'hidden' || target.type === 'timer') {
                        interact.append(el('button', { class: 'btn primary', onclick: () => {
                                if (p) {
                                    const ok = confirm('هل أكملت التحدي؟');
                                    if (ok) { toast('✅ أحسنت!', 'good');
                                        Sound.reward();
                                        engine.completePersonal(p, true); } else { toast('❌ للأسف!',
                                            'bad');
                                        Sound.boo();
                                        engine.completePersonal(p, false); }
                                    renderPlay();
                                }
                            } }, 'أكملت ✅'));
                    }
                } else {
                    interact.append(el('p', { style: 'color:var(--muted)' }, 'انتظر دورك...'));
                }
            }

            // --- Chaos, Stream, Punishment, Reward ---
            else if (['chaos', 'stream', 'punishment', 'reward'].includes(stateType)) {
                interact.append(el('div', { class: 'chaos-effect' },
                    stateType === 'chaos' ? '🌀' :
                    stateType === 'stream' ? '📡' :
                    stateType === 'punishment' ? '💢' : '🎁'
                ));
                interact.append(el('p', { style: 'color:var(--muted);margin-top:8px' }, 'تم تطبيق التحدي!'));
                // For stream challenges that need interaction
                if (stateType === 'stream') {
                    const secret = engine.getSecretNumber();
                    if (secret) {
                        interact.append(el('p', { style: 'font-weight:700' }, `خمن الرقم السري بين 1 و 10`));
                        const inp = el('input', { class: 'input', type: 'number', min: 1, max: 10,
                            placeholder: 'خمن...', onkeydown: (e) => {
                                if (e.key === 'Enter' && inp.value) {
                                    const u = Auth.current();
                                    const p = players.find(p => p.name === u.username);
                                    if (p) { p._secretGuess = parseInt(inp.value);
                                        toast('تم التخمين!', 'good');
                                        Sound.vote();
                                        renderPlay(); }
                                }
                            } });
                        interact.append(inp);
                    }
                    const color = engine.getColorTarget();
                    if (color) {
                        interact.append(el('p', { style: 'font-weight:700' }, `اختر اللون الصحيح:`));
                        const opts = el('div', { class: 'q-options' });
                        color.colors.forEach(c => {
                            opts.append(el('button', { class: 'btn sm', onclick: () => {
                                    const u = Auth.current();
                                    const p = players.find(p => p.name === u.username);
                                    if (p) { p._colorGuess = c;
                                        toast(`اخترت ${c}`, 'good');
                                        Sound.vote();
                                        renderPlay(); }
                                } }, c));
                        });
                        interact.append(opts);
                    }
                    const survive = engine.getSurviveTarget();
                    if (survive) {
                        interact.append(el('p', { style: 'font-weight:700' },
                            `اضغط في ${survive.time} ثواني بالضبط!`));
                        let startTime = Date.now();
                        interact.append(el('button', { class: 'btn primary', onclick: () => {
                                const elapsed = (Date.now() - startTime) / 1000;
                                const u = Auth.current();
                                const p = players.find(p => p.name === u.username);
                                if (p) { p._surviveTime = elapsed;
                                    toast(`⏱️ ${elapsed.toFixed(1)} ثانية`, 'good');
                                    Sound.vote();
                                    renderPlay(); }
                            } }, 'اضغط!'));
                    }
                    const spin = engine.getSpinResult();
                    if (spin) {
                        interact.append(el('p', { style: 'font-weight:700;font-size:1.4rem' }, `🎡 ${spin}`));
                    }
                }
            }

            page.append(interact);

            // Leaderboard
            page.append(el('div', { class: 'grid g2', style: 'margin-top:18px' },
                el('div', { class: 'glass', style: 'padding:16px' },
                    el('h3', { style: 'font-family:Orbitron;color:var(--neon-blue);margin-bottom:10px' },
                        'الترتيب المباشر'),
                    ...sorted.map((p, i) => {
                        const isDev = p.name === 'YAMEN';
                        return el('div', { class: 'player-row' + (i < 3 ? ' top' : '') },
                            el('span', {}, `#${i+1}`),
                            el('span', { style: 'flex:1' },
                                p.tempName || p.name,
                                p.bot ? el('span', { class: 'badge', style: 'margin-inline-start:6px' },
                                    'BOT') : null,
                                isDev ? el('span', { class: 'dev-badge' }, 'مطور') : null,
                                p.redName ? el('span', { style: 'color:red;margin-inline-start:6px' },
                                    '🔴') : null,
                                p.muted ? el('span', { style: 'color:var(--muted);margin-inline-start:6px' },
                                    '🔇') : null,
                                p.frozen ? el('span', { style: 'color:var(--neon-blue);margin-inline-start:6px' },
                                    '🧊') : null
                            ),
                            el('span', { style: 'color:var(--neon-blue);font-weight:700' }, String(Math.floor(p
                                    .score)))
                        );
                    })
                ),
                el('div', { class: 'glass', style: 'padding:16px' },
                    el('h3', { style: 'font-family:Orbitron;color:var(--neon-purple);margin-bottom:10px' },
                        'سجل الأحداث'),
                    el('div', { style: 'max-height:200px;overflow:auto;font-size:.85rem' },
                        ...(g.logs || []).slice(-10).map(l =>
                            el('div', { style: 'padding:4px 0;color:var(--muted);border-bottom:1px solid var(--glass-brd)' },
                                l)
                        )
                    )
                )
            ));

            // Round info
            page.append(el('div', { style: 'text-align:center;color:var(--muted);margin-top:12px;font-size:.85rem' },
                `الجولة ${engine.getRound()}/${g.maxRounds || 8} — ${engine.isGameOver() ? 'انتهت' : 'جارية...'}`
            ));
        }

        /* ---------- END GAME ---------- */
        function endPartyGame() {
            const g = state.game;
            if (!g) return;
            const engine = PartyEngine;
            clearInterval(g._iv);

            const players = engine.getPlayers();
            const sorted = [...players].sort((a, b) => b.score - a.score);
            const u = Auth.current();
            const me = players.find(p => p.name === u.username);
            const meRank = me ? sorted.findIndex(p => p.name === u.username) + 1 : -1;
            const won = meRank === 1;

            // Update stats
            u.stats.matches++;
            if (won) { u.stats.wins++;
                grantCoins(200);
                grantGems(3);
                grantXP(80);
                Sound.win();
                if (u.stats.wins === 1) unlockAch('first_win', 'أول انتصار!'); } else { u.stats.losses++;
                grantCoins(50);
                grantXP(30);
                Sound.lose(); }

            // Apply gems lost/bonus
            if (me) {
                if (me.gemsLost > 0) { const lost = Math.min(me.gemsLost, u.gems);
                    u.gems -= lost; }
                if (me.gemsBonus > 0) u.gems += me.gemsBonus;
                if (me.xpBonus > 0) grantXP(me.xpBonus);
            }

            // Founder gets special treatment
            if (Auth.isFounder(u)) {
                u.coins = 999999999;
                u.gems = 999999999;
            }

            u.history.unshift({ date: Date.now(), rank: meRank, won, score: me ? Math.floor(me.score) : 0 });
            u.history = u.history.slice(0, 20);
            DB.save();

            // Show results
            showPartyResults(sorted, meRank, won, u);
            state.game = null;
        }
