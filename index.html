                { id: 'gem_pack', name: 'حزمة جواهر ×10', price: 100, cur: 'coins', emoji: '💎' },
            ];
            page.append(el('div', { class: 'hero' }, el('h2', {}, 'المتجر 🛒'), el('p', {}, 'اشترِ أشياء بالعملات والجواهر.')));
            page.append(el('div', { class: 'grid g3' }, ...items.map(it => {
                const owned = u.inventory.includes(it.id);
                const canBuy = isF ? true : u[it.cur] >= it.price;
                return el('div', { class: 'card' },
                    el('div', { style: 'font-size:3rem;text-align:center' }, it.emoji),
                    el('h3', { style: 'text-align:center' }, it.name),
                    el('p', { style: 'text-align:center' }, `${it.price} ${it.cur === 'coins' ? '🪙' : '💎'}`),
                    el('button', { class: 'btn primary', style: 'width:100%;margin-top:8px', disabled: owned ||
                            !canBuy, onclick: () => {
                            if (isF) {
                                u.inventory.push(it.id);
                                DB.save();
                                renderTopBar();
                                toast('تم الشراء ✅ (حساب مؤسس)', 'gold');
                                Sound.reward();
                                render();
                                return;
                            }
                            if (u[it.cur] < it.price) { toast('رصيد غير كاف', 'bad'); return; }
                            u[it.cur] -= it.price;
                            u.inventory.push(it.id);
                            DB.save();
                            renderTopBar();
                            toast('تم الشراء ✅', 'good');
                            Sound.reward();
                            render();
                        } },
                        owned ? '✅ تم الامتلاك' : (isF ? 'شراء (مجاني)' : 'شراء')
                    )
                );
            })));
            if (isF) {
                page.append(el('div', { class: 'glass', style: 'padding:16px;margin-top:18px;border-color:gold;text-align:center' },
                    el('p', { style: 'color:gold;font-weight:700' }, '👑 حساب مؤسس — جميع المشتريات مجانية')
                ));
            }
        };

        /* ---------- PROFILE ---------- */
        routes.profile = (page, u) => {
            const isF = Auth.isFounder(u);
            const nameI = el('input', { class: 'input', value: u.username, readonly: true });
            const emailI = el('input', { class: 'input', value: u.email, readonly: true });
            const avatars = ['🎮', '🚀', '⭐', '🔥', '⚡', '👑', '🎯', '💎', '🦁', '🐉', '🥷', '🤖'];
            const picker = el('div', { class: 'avatar-picker' });
            avatars.forEach(a => {
                const b = el('div', { class: 'ap' + (u.avatar === a ? ' sel' : ''), onclick: () => {
                        u.avatar = a;
                        u.avatarColor = Math.floor(Math.random() * 360);
                        DB.save();
                        render();
                    } }, a);
                picker.append(b);
            });

            page.append(
                el('div', { class: 'hero' }, el('h2', {}, 'الملف الشخصي'), el('p', {}, 'حرّر اسمك، غيّر الصورة الرمزية، وشاهد إحصائياتك.')),
                el('div', { class: 'grid g2' },
                    el('div', { class: 'glass', style: 'padding:20px' },
                        el('h3', { style: 'font-family:Orbitron;color:var(--neon-blue);margin-bottom:10px' },
                            'الصورة الرمزية'),
                        picker,
                        el('label', {}, 'اسم المستخدم'), nameI,
                        el('label', {}, 'البريد'), emailI,
                        isF ? el('p', { style: 'color:gold;font-weight:700;margin:8px 0' },
                            '👑 حساب مؤسس موثّق ✓') : null,
                        u.title ? el('p', { style: 'color:var(--neon-pink);font-weight:700' }, `🏷️ ${u.title}`) :
                        null,
                        el('button', { class: 'btn danger', style: 'margin-top:12px', onclick: () => {
                                Auth.logout();
                                toast('تم الخروج', 'good');
                                state.view = 'auth';
                                render();
                            } }, 'تسجيل خروج')
                    ),
                    el('div', { class: 'glass', style: 'padding:20px' },
                        el('h3', { style: 'font-family:Orbitron;color:var(--neon-purple);margin-bottom:10px' },
                            'الإحصائيات'),
                        el('div', { class: 'grid g2' },
                            stat('انتصارات', u.stats.wins),
                            stat('خسائر', u.stats.losses),
                            stat('مباريات', u.stats.matches),
                            stat('نسبة الفوز', u.stats.matches ? Math.round(u.stats.wins / u.stats.matches *
                                100) + '%' : '0%'),
                            stat('عملات', isF ? '∞' : u.coins),
                            stat('جواهر', isF ? '∞' : u.gems),
                            stat('XP', u.xp),
                            stat('المستوى', u.level),
                        ),
                        el('h4', { style: 'margin-top:14px;color:var(--muted)' }, 'الإنجازات'),
                        el('div', { style: 'display:flex;flex-wrap:wrap;gap:6px;margin-top:6px' },
                            ...(u.achievements.length ? u.achievements.map(a => el('span', { class: 'badge' },
                                    '🏆 ' + a)) : [el('span', { style: 'color:var(--muted)' },
                                    'لا يوجد بعد')])
                        ),
                        el('h4', { style: 'margin-top:14px;color:var(--muted)' }, 'آخر المباريات'),
                        el('div', { style: 'max-height:160px;overflow:auto' },
                            ...(u.history.length ? u.history.map(h => el('div', { class: 'player-row' },
                                el('span', {}, new Date(h.date).toLocaleDateString('ar-EG')),
                                el('span', { style: 'flex:1' }, h.won ? '✅ فوز' : '❌ خسارة'),
                                el('span', {}, `#${h.rank} • ${h.score}`)
                            )) : [el('div', { style: 'color:var(--muted);padding:8px' }, 'لا يوجد')])
                        )
                    )
                )
            );
        };

        /* ---------- SETTINGS ---------- */
        routes.settings = (page) => {
            const s = DB.data.settings;
            const music = el('input', { type: 'range', min: 0, max: 1, step: .05, value: s.music, oninput: (e) => { s
                        .music = +e.target.value;
                    DB.save(); } });
            const sfx = el('input', { type: 'range', min: 0, max: 1, step: .05, value: s.sfx, oninput: (e) => { s.sfx =
                        +e.target.value;
                    DB.save(); } });
            const mute = el('input', { type: 'checkbox', checked: s.muted, onchange: (e) => { s.muted = e.target
                        .checked;
                    DB.save(); } });
            page.append(
                el('div', { class: 'hero' }, el('h2', {}, 'الإعدادات ⚙️'), el('p', {}, 'تحكم بالصوت، والبيانات، والحساب.')),
                el('div', { class: 'grid g2' },
                    el('div', { class: 'glass', style: 'padding:20px' },
                        el('h3', { style: 'font-family:Orbitron;color:var(--neon-blue);margin-bottom:10px' },
                            'الصوت'),
                        el('label', {}, 'موسيقى الخلفية'), music,
                        el('label', { style: 'margin-top:10px' }, 'المؤثرات الصوتية'), sfx,
                        el('div', { class: 'row', style: 'margin-top:12px' }, mute, el('span', {}, 'كتم كل الأصوات'))
                    ),
                    el('div', { class: 'glass', style: 'padding:20px' },
                        el('h3', { style: 'font-family:Orbitron;color:var(--bad);margin-bottom:10px' },
                            'إدارة البيانات'),
                        el('p', { style: 'color:var(--muted);margin-bottom:10px' }, 'حذف كل حسابات وبيانات هذا الجهاز (لا يمكن التراجع).'),
                        el('button', { class: 'btn', onclick: () => {
                                const blob = new Blob([JSON.stringify(DB.data, null, 2)], { type: 'application/json' });
                                const a = document.createElement('a');
                                a.href = URL.createObjectURL(blob);
                                a.download = 'yalla-save.json';
                                a.click();
                            } }, 'تصدير النسخة'),
                        el('button', { class: 'btn danger', style: 'margin-inline-start:8px', onclick: () => {
                                if (confirm('حذف كل شيء؟')) { localStorage.removeItem('yalla_db_v2');
                                    localStorage.removeItem('yalla_remember');
                                    DB.load();
                                    state.view = 'auth';
                                    render(); }
                            } }, 'مسح كل البيانات')
                    )
                )
            );
        };

        /* ---------- Boot ---------- */
        render();

        // Expose to console for debugging
        window._DB = DB;
        window._Auth = Auth;
        window._PartyEngine = PartyEngine;
        window._state = state;
    </script>
</body>
</html>
